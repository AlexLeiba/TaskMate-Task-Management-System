name: Clone the repo

on:
  push:
    branches:
      - staging
      - workflow
  pull_request:
    types:
      - opened
    branches:
      - master

jobs:
  install_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6 # close the repo in the environment machine on ubuntu
      - name: Print the branch name
        run: echo ${{ github.actor }} ${{ github.event_name }} ${{ github.ref }}
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
