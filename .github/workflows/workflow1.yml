name: Clone the repo

on:
  # push:
  #   branches:
  #     - staging
  #     - workflow
  #     - master
  pull_request:
    types:
      - opened
      - reopened
    branches:
      - staging

jobs:
  install_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6 # clone the repo in the environment machine on ubuntu (linux) actions/ perform predefined setup tasks, built-in steps
      - name: "Install node"
        uses: actions/setup-node@v4 # install node
        with:
          node-version: "latest"
      - name: Print the branch name
        run: echo ${{ github.actor }} ${{ github.event_name }} ${{ github.ref }}
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
